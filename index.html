<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf Tournament Manager</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ path, size = 24, className = '', fill = 'none' }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{path}</svg>
        );

        const Users = (p) => <Icon {...p} path={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />;
        const UserMinus = (p) => <Icon {...p} path={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="22" y1="11" x2="16" y2="11"/></>} />;
        const RotateCcw = (p) => <Icon {...p} path={<><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></>} />;
        const Play = (p) => <Icon {...p} path={<polygon points="5 3 19 12 5 21 5 3"/>} />;
        const Skull = (p) => <Icon {...p} path={<><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><path d="M8 20v2h8v-2"/><path d="m12.5 17-.5-1-.5 1h1z"/><path d="M16 20a2 2 0 0 0 1.56-3.25 8 8 0 1 0-11.12 0A2 2 0 0 0 8 20"/></>} />;
        const Moon = (p) => <Icon {...p} path={<path d="M12 3a6 6 0 0 0 9 9 9 9 1 1-9-9Z"/>} />;
        const Eye = (p) => <Icon {...p} path={<><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></>} />;
        const EyeOff = (p) => <Icon {...p} path={<><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></>} />;
        const CheckCircle2 = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>} />;
        const Heart = (p) => <Icon {...p} path={<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>} />;
        const Settings = (p) => <Icon {...p} path={<><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>} />;
        const XIcon = (p) => <Icon {...p} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
        const Plus = (p) => <Icon {...p} path={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />;
        const Trash2 = (p) => <Icon {...p} path={<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />;
        const LogOut = (p) => <Icon {...p} path={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>} />;
        const Smartphone = (p) => <Icon {...p} path={<><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></>} />;
        const Shuffle = (p) => <Icon {...p} path={<><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></>} />;
        const Shield = (p) => <Icon {...p} path={<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>} />;

        const ALL_CLASSES = ["1A", "1B", "1C", "1D", "2A", "2B", "2C", "2D", "3A", "3B", "3C", "3D", "4A", "4B", "4C", "4D", "5A", "5B", "5C", "5D"];
        const NIGHT_ORDER = ["Cupid", "Serial Killer", "Werewolves", "Doctor", "Seer", "Witch", "Red Lady"];
        const ROLE_DESCRIPTIONS = {
            "Werewolf": "Win if Serial killer is dead and the no. of villagers alive = no. of werewolves alive. The Serial Killer does not die when attacked.",
            "Seer": "Check a role to see if the player is good or evil.",
            "Doctor": "Save someone from the Werewolves or the Serial Killer.",
            "Serial Killer": "Kill everyone to win. Immune to Night attacks.",
            "Witch": "Has one kill potion and one save potion.",
            "Prince": "When lynched, reveal role and survive (First time only).",
            "Villager": "No special powers, find the killers.",
            "Cupid": "Pick 2 players to be Lovers on Night 1. If one dies, the other dies.",
            "Red Lady": "Visit someone at night. If they are Werewolf or targeted to die, you die. If you are targeted, you survive if visiting someone safe."
        };

        const getInitialRosters = () => [
            { id: 'r1', name: 'Standard Pool', players: ["1A", "1B", "1C", "1D", "2A", "2B", "2C", "2D", "3A", "3B", "3C", "3D"] }
        ];

        const getInitialDeck = () => ({
            "Werewolf": 3, "Seer": 1, "Doctor": 1, "Witch": 1, "Serial Killer": 1, "Prince": 1, "Villager": 2, "Cupid": 1, "Red Lady": 1
        });

        const getInitialRounds = () => {
            const initial = {};
            [1, 2, 3, 4, 5].forEach(num => {
                initial[`round_${num}`] = {
                    id: `round_${num}`, name: `Round ${num}`, rosterId: 'r1', roomCode: "", isStarted: false, 
                    players: [], nightNumber: 1, witchUsedPotion: false, isVotingActive: false
                };
            });
            return initial;
        };

        const generateRoomCode = () => Math.random().toString(36).substring(2, 6).toUpperCase();

        const App = () => {
            const [appMode, setAppMode] = useState('landing');
            const [isLoading, setIsLoading] = useState(true);
            const [loginError, setLoginError] = useState("");

            const [deviceId] = useState(() => {
                let id = localStorage.getItem('ww_device_id');
                if (!id) {
                    id = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                    localStorage.setItem('ww_device_id', id);
                }
                return id;
            });

            const [rosters, setRosters] = useState(getInitialRosters);
            const [roundsData, setRoundsData] = useState(getInitialRounds);
            const [roleDeck, setRoleDeck] = useState(getInitialDeck);
            const [useDefaultRoles, setUseDefaultRoles] = useState(true);

            const [activeRound, setActiveRound] = useState('round_1');
            const [isEditingRoster, setIsEditingRoster] = useState(false);
            const [editingRosterId, setEditingRosterId] = useState(null);
            const [rosterDraftName, setRosterDraftName] = useState("");
            const [rosterDraftPlayers, setRosterDraftPlayers] = useState("");
            const [showRoles, setShowRoles] = useState(false);
            const [activeSettingsTab, setActiveSettingsTab] = useState('groups');

            const [playerRoomInput, setPlayerRoomInput] = useState("");
            const [playerClassInput, setPlayerClassInput] = useState("");
            const [resolvedPlayerName, setResolvedPlayerName] = useState("");
            const [playerError, setPlayerError] = useState("");
            const [playerData, setPlayerData] = useState(null);

            const [userEmail, setUserEmail] = useState("");
            const [clientState, setClientState] = useState({ votes: {}, revealedSheriffs: [] });

            useEffect(() => {
                async function checkSession() {
                    try {
                        const r = await fetch('/api/get-data');
                        if (r.ok) {
                            const resJson = await r.json();
                            if (resJson.data) {
                                const profile = JSON.parse(resJson.data);
                                setRosters(profile.rosters || getInitialRosters());
                                setRoundsData(profile.roundsData || getInitialRounds());
                                setRoleDeck(profile.roleDeck || getInitialDeck());
                                setUseDefaultRoles(profile.useDefaultRoles !== undefined ? profile.useDefaultRoles : true);
                            }
                            setAppMode('host');
                        }
                    } catch (err) {}
                    setIsLoading(false);
                }
                checkSession();
            }, []);

            useEffect(() => {
                if (appMode !== 'host') return;
                const timer = setInterval(async () => {
                    try {
                        const currentRound = roundsData[activeRound];
                        if (!currentRound || !currentRound.roomCode) return;
                        const response = await fetch(`/api/get-room-actions?roomCode=${currentRound.roomCode}`);
                        if (response.ok) {
                            const data = await response.json();
                            setClientState(data);
                        }
                    } catch (err) {
                        console.error("Failed sync live actions", err);
                    }
                }, 3000);
                return () => clearInterval(timer);
            }, [appMode, activeRound, roundsData]);

            useEffect(() => {
                if (appMode !== 'player' || !playerRoomInput || !resolvedPlayerName) return;
                const timer = setInterval(async () => {
                    try {
                        const r = await fetch(`/api/get-role?roomCode=${playerRoomInput.trim()}&playerName=${resolvedPlayerName}&deviceId=${deviceId}`);
                        if (r.ok) {
                            const data = await r.json();
                            setPlayerData(data);
                        } else {
                            const data = await r.json();
                            setPlayerError(data.error || "Disconnected from server.");
                            setPlayerData(null);
                        }
                    } catch (err) {}
                }, 3000);
                return () => clearInterval(timer);
            }, [appMode, playerRoomInput, resolvedPlayerName, deviceId]);

            const triggerProfileSave = async (updatedRosters, updatedRounds, updatedDeck, updatedDefault) => {
                try {
                    await fetch('/api/save-data', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            data: { rosters: updatedRosters, roundsData: updatedRounds, roleDeck: updatedDeck, useDefaultRoles: updatedDefault }
                        })
                    });
                } catch (e) {
                    console.error("Save state failed", e);
                }
            };

            const handleGoogleLogin = async (response) => {
                setIsLoading(true);
                setLoginError("");
                try {
                    const res = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ credential: response.credential })
                    });
                    if (res.ok) {
                        const data = await res.json();
                        setUserEmail(data.email);
                        const r = await fetch('/api/get-data');
                        if (r.ok) {
                            const resJson = await r.json();
                            if (resJson.data) {
                                const profile = JSON.parse(resJson.data);
                                setRosters(profile.rosters || getInitialRosters());
                                setRoundsData(profile.roundsData || getInitialRounds());
                                setRoleDeck(profile.roleDeck || getInitialDeck());
                                setUseDefaultRoles(profile.useDefaultRoles !== undefined ? profile.useDefaultRoles : true);
                            }
                        }
                        setAppMode('host');
                    } else {
                        setLoginError("Login verified failed.");
                    }
                } catch (err) {
                    setLoginError("Could not connect to database.");
                }
                setIsLoading(false);
            };

            const handleLogout = async () => {
                await fetch('/api/logout', { method: 'POST' });
                setAppMode('landing');
                setUserEmail("");
                setRosters(getInitialRosters());
                setRoundsData(getInitialRounds());
                setRoleDeck(getInitialDeck());
                setUseDefaultRoles(true);
            };

            const saveRoster = () => {
                const playerList = rosterDraftPlayers.split('\n').map(p => p.trim()).filter(p => p.length > 0);
                if (!rosterDraftName.trim() || playerList.length === 0) {
                    alert("Name and player list cannot be empty.");
                    return;
                }
                const newRoster = { id: editingRosterId || 'roster_' + Date.now(), name: rosterDraftName.trim(), players: playerList };
                let updatedRosters = editingRosterId ? rosters.map(r => r.id === editingRosterId ? newRoster : r) : [...rosters, newRoster];
                setRosters(updatedRosters);
                setEditingRosterId(null);
                setRosterDraftName("");
                setRosterDraftPlayers("");
                setIsEditingRoster(false);
                if (currentRound.rosterId === newRoster.id && !currentRound.isStarted) applyRosterToRound(activeRound, newRoster.id, updatedRosters);
                triggerProfileSave(updatedRosters, roundsData, roleDeck, useDefaultRoles);
            };

            const deleteRoster = (id) => {
                if (rosters.length <= 1) {
                    alert("You must keep at least one registration group.");
                    return;
                }
                const updated = rosters.filter(r => r.id !== id);
                setRosters(updated);
                if (currentRound.rosterId === id && !currentRound.isStarted) applyRosterToRound(activeRound, updated[0].id, updated);
                triggerProfileSave(updated, roundsData, roleDeck, useDefaultRoles);
            };

            const openRosterEdit = (roster) => {
                setEditingRosterId(roster.id);
                setRosterDraftName(roster.name);
                setRosterDraftPlayers(roster.players.join('\n'));
                setIsEditingRoster(true);
            };

            const openRosterCreate = () => {
                setEditingRosterId(null);
                setRosterDraftName("");
                setRosterDraftPlayers("");
                setIsEditingRoster(true);
            };

            const updateRoleDeck = (role, delta) => {
                const updated = { ...roleDeck, [role]: Math.max(0, (roleDeck[role] || 0) + delta) };
                setRoleDeck(updated);
                triggerProfileSave(rosters, roundsData, updated, useDefaultRoles);
            };

            const handleToggleDefaultRoles = (val) => {
                setUseDefaultRoles(val);
                triggerProfileSave(rosters, roundsData, roleDeck, val);
            };

            const applyRosterToRound = (roundId, rosterId, currentRostersList = rosters) => {
                const targetRoster = currentRostersList.find(r => r.id === rosterId) || currentRostersList[0];
                const updatedRounds = { ...roundsData };
                updatedRounds[roundId].rosterId = rosterId;
                updatedRounds[roundId].players = targetRoster.players.map(cls => ({
                    class: cls, role: "", isAlive: true, isRecentlyDead: false, isAbsent: false, isLover: false, isTurned: false
                }));
                setRoundsData(updatedRounds);
                triggerProfileSave(currentRostersList, updatedRounds, roleDeck, useDefaultRoles);
            };

            const handleRoundRosterChange = (rosterId) => {
                if (roundsData[activeRound].isStarted) return;
                applyRosterToRound(activeRound, rosterId);
            };

            const startRound = async () => {
                const round = roundsData[activeRound];
                const activePlayers = round.players.filter(p => !p.isAbsent);
                const currentDeck = useDefaultRoles ? { "Werewolf": 3, "Seer": 1, "Doctor": 1, "Witch": 1, "Serial Killer": 1, "Prince": 1, "Villager": Math.max(0, activePlayers.length - 8) } : roleDeck;
                const pool = [];
                Object.entries(currentDeck).forEach(([role, qty]) => {
                    for (let i = 0; i < qty; i++) pool.push(role);
                });
                if (pool.length < activePlayers.length) {
                    alert(`Not enough roles! Deck has ${pool.length} allocated for ${activePlayers.length} active players. Check role deck config.`);
                    return;
                }
                for (let i = pool.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [pool[i], pool[j]] = [pool[j], pool[i]];
                }
                const updatedRounds = { ...roundsData };
                const targetRound = updatedRounds[activeRound];
                let poolIdx = 0;
                targetRound.players.forEach(p => {
                    if (!p.isAbsent) {
                        p.role = pool[poolIdx];
                        poolIdx++;
                    } else {
                        p.role = "";
                    }
                    p.isAlive = true;
                    p.isRecentlyDead = false;
                    p.isLover = false;
                    p.isTurned = false;
                });
                targetRound.roomCode = generateRoomCode();
                targetRound.isStarted = true;
                targetRound.nightNumber = 1;
                targetRound.witchUsedPotion = false;
                targetRound.isVotingActive = false;
                setRoundsData(updatedRounds);
                setClientState({ votes: {}, revealedSheriffs: [] });
                try {
                    await fetch('/api/host-room', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ roomCode: targetRound.roomCode, roundData: targetRound })
                    });
                    await fetch('/api/player-action', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ roomCode: targetRound.roomCode, action: 'RESET_ALL' })
                    });
                } catch (e) {}
                triggerProfileSave(rosters, updatedRounds, roleDeck, useDefaultRoles);
            };

            const endRound = () => {
                if (!confirm("Are you sure you want to end this game? Connected phones will be kicked out.")) return;
                const updatedRounds = { ...roundsData };
                updatedRounds[activeRound] = {
                    id: activeRound, name: updatedRounds[activeRound].name, rosterId: updatedRounds[activeRound].rosterId, roomCode: "", 
                    isStarted: false, players: [], nightNumber: 1, witchUsedPotion: false, isVotingActive: false
                };
                setRoundsData(updatedRounds);
                setClientState({ votes: {}, revealedSheriffs: [] });
                applyRosterToRound(activeRound, updatedRounds[activeRound].rosterId);
            };

            const toggleVoting = async () => {
                const updatedRounds = { ...roundsData };
                const round = updatedRounds[activeRound];
                round.isVotingActive = !round.isVotingActive;
                setRoundsData(updatedRounds);
                if (!round.isVotingActive) {
                    await fetch('/api/player-action', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ roomCode: round.roomCode, action: 'CLEAR_VOTES' })
                    });
                }
                try {
                    await fetch('/api/host-room', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ roomCode: round.roomCode, roundData: round })
                    });
                } catch (e) {}
            };

            const clearAllVotes = async () => {
                const round = roundsData[activeRound];
                await fetch('/api/player-action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ roomCode: round.roomCode, action: 'CLEAR_VOTES' })
                });
                setClientState(prev => ({ ...prev, votes: {} }));
            };

            const toggleAlive = (index) => {
                const newData = { ...roundsData };
                const player = newData[activeRound].players[index];
                const isLover = player.isLover;
                let nextAlive = player.isAlive ? false : !player.isRecentlyDead;
                let nextRecent = player.isAlive ? true : false;
                player.isAlive = nextAlive;
                player.isRecentlyDead = nextRecent;
                if (isLover) newData[activeRound].players.forEach(p => {
                    if (p.isLover && p !== player) {
                        p.isAlive = nextAlive;
                        p.isRecentlyDead = nextRecent;
                    }
                });
                setRoundsData(newData);
                syncHostStateToRedis(newData[activeRound]);
            };

            const toggleAbsent = (index) => {
                if (roundsData[activeRound].isStarted) return;
                const newData = { ...roundsData };
                newData[activeRound].players[index].isAbsent = !newData[activeRound].players[index].isAbsent;
                setRoundsData(newData);
                triggerProfileSave(rosters, newData, roleDeck, useDefaultRoles);
            };

            const toggleLover = (index) => {
                const newData = { ...roundsData };
                newData[activeRound].players[index].isLover = !newData[activeRound].players[index].isLover;
                setRoundsData(newData);
                syncHostStateToRedis(newData[activeRound]);
            };

            const toggleTurned = (index) => {
                const newData = { ...roundsData };
                newData[activeRound].players[index].isTurned = !newData[activeRound].players[index].isTurned;
                setRoundsData(newData);
                syncHostStateToRedis(newData[activeRound]);
            };

            const advanceNight = () => {
                const newData = { ...roundsData };
                newData[activeRound].nightNumber += 1;
                newData[activeRound].players.forEach(p => { p.isRecentlyDead = false; });
                setRoundsData(newData);
                syncHostStateToRedis(newData[activeRound]);
            };

            const syncHostStateToRedis = async (roundObj) => {
                try {
                    await fetch('/api/host-room', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ roomCode: roundObj.roomCode, roundData: roundObj })
                    });
                } catch (e) {}
                triggerProfileSave(rosters, roundsData, roleDeck, useDefaultRoles);
            };

            const sortPlayersByNightDeck = () => {
                const newData = { ...roundsData };
                const players = [...newData[activeRound].players];
                const playerSortKeys = new Map();
                players.forEach(p => {
                    if (p.isAbsent || !p.isAlive) playerSortKeys.set(p.class, 999);
                    else {
                        let score = 100;
                        if (p.role === 'Cupid') score = 1;
                        else if (p.role === 'Serial Killer') score = 2;
                        else if (p.role.includes('Werewolf')) score = 3;
                        else if (p.role === 'Doctor') score = 4;
                        else if (p.role === 'Seer') score = 5;
                        else if (p.role === 'Witch') score = 6;
                        else if (p.role === 'Red Lady') score = 7;
                        if (['Seer', 'Witch', 'Doctor', 'Cupid'].includes(p.role)) score = 20;
                        playerSortKeys.set(p.class, score);
                    }
                });
                players.sort((a, b) => playerSortKeys.get(a.class) - playerSortKeys.get(b.class));
                newData[activeRound].players = players;
                setRoundsData(newData);
            };

            const unlockPlayer = async (playerName) => {
                try {
                    const response = await fetch('/api/player-action', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },

                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                            {currentRound.players.map((player, idx) => {
                                                if (player.isAbsent) return null;
                                                return (
                                                    <div 
                                                        key={player.class} 
                                                        onClick={() => toggleAlive(idx)}
                                                        className={`bg-slate-900 border rounded-2xl p-5 relative overflow-hidden transition-all duration-200 group cursor-pointer select-none ${!player.isAlive ? 'border-red-900/50 bg-red-950/5 shadow-inner opacity-60' : player.isRecentlyDead ? 'border-orange-500/50 shadow-[0_0_15px_rgba(249,115,22,0.1)]' : 'border-slate-800 hover:border-slate-700'}`}
                                                    >
                                                        {!player.isAlive && (
                                                            <div className="absolute top-0 right-0 w-24 h-24 bg-red-600/5 rounded-full blur-2xl"></div>
                                                        )}
                                                        
                                                        <div className="flex justify-between items-start mb-3">
                                                            <div>
                                                                <div className="flex items-center">
                                                                    <span className="font-bold text-lg">{player.class}</span>
                                                                    {currentRound.isStarted && (
                                                                        <button 
                                                                            onClick={(e) => { 
                                                                                e.stopPropagation(); 
                                                                                unlockPlayer(player.class); 
                                                                            }} 
                                                                            className="ml-2 text-[10px] bg-slate-800 hover:bg-slate-600 border border-slate-500 text-slate-300 py-1 px-2 rounded font-bold transition-colors z-10 uppercase"
                                                                        >
                                                                            Unlock
                                                                        </button>
                                                                    )}
                                                                </div>
                                                                <div className="flex items-center gap-1.5 mt-0.5">
                                                                    <span className={`text-[10px] px-1.5 py-0.5 rounded uppercase font-black tracking-wider ${!player.isAlive ? 'bg-red-950 text-red-400 border border-red-900/50' : player.isRecentlyDead ? 'bg-orange-950 text-orange-400 border border-orange-900/50 animate-pulse' : 'bg-emerald-950 text-emerald-400 border border-emerald-900/50'}`}>
                                                                        {!player.isAlive ? 'Eliminated' : player.isRecentlyDead ? 'Dead This Night' : 'Active'}
                                                                    </span>
                                                                </div>
                                                            </div>

                                                            <div className="flex items-center gap-1">
                                                                <button 
                                                                    onClick={(e) => { e.stopPropagation(); toggleLover(idx); }} 
                                                                    className={`p-1.5 rounded-lg border transition-all ${player.isLover ? 'bg-pink-950 border-pink-700 text-pink-400 shadow-sm' : 'bg-slate-950 border-slate-800 text-slate-600 hover:text-slate-400'}`} 
                                                                    title="Toggle Cupid Link Flag"
                                                                >
                                                                    <Heart size={14} fill={player.isLover ? 'currentColor' : 'none'} />
                                                                </button>
                                                                <button 
                                                                    onClick={(e) => { e.stopPropagation(); toggleTurned(idx); }} 
                                                                    className={`p-1.5 rounded-lg border transition-all ${player.isTurned ? 'bg-orange-950 border-orange-700 text-orange-400 shadow-sm' : 'bg-slate-950 border-slate-800 text-slate-600 hover:text-slate-400'}`} 
                                                                    title="Toggle Turned Status Condition"
                                                                >
                                                                    <Moon size={14} />
                                                                </button>
                                                            </div>
                                                        </div>

                                                        {player.role && (
                                                            <div className="mt-4 pt-3 border-t border-slate-800 flex justify-between items-center">
                                                                <span className={`text-xs font-bold tracking-wider uppercase transition-all duration-200 ${showRoles ? 'text-blue-400 font-black' : 'text-slate-600 bg-slate-950 px-2 py-0.5 rounded select-none filter blur-sm group-hover:blur-none'}`}>
                                                                    {player.role}
                                                                </span>
                                                                {isRevealedSheriff(player.class) && (
                                                                    <span className="text-[10px] bg-yellow-950 text-yellow-500 border border-yellow-800/50 font-black px-2 py-0.5 rounded flex items-center gap-1 shadow-sm uppercase tracking-wider animate-bounce">
                                                                        ★ Sheriff
                                                                    </span>
                                                                )}
                                                            </div>
                                                        )}

                                                        {currentRound.isVotingActive && (
                                                            <div className="mt-2 relative h-6">
                                                                {getPlayerVote(player.class) && (
                                                                    <div className="absolute top-0 left-1/2 -translate-x-1/2 bg-blue-600 border border-blue-400 text-white text-[9px] font-bold px-2 py-0.5 rounded-full whitespace-nowrap z-20">
                                                                        Voted: {getPlayerVote(player.class)}
                                                                    </div>
                                                                )}
                                                                {clientState.firstVoters && clientState.firstVoters[player.class] && player.role === 'Prince' && (
                                                                    <div className="mt-1 text-xs font-bold text-red-400 bg-red-950/50 rounded p-1 border border-red-900/50">
                                                                        Lynched: {clientState.firstVoters[player.class]}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        )}

                                                        {currentRound.isVotingActive && voteTally[player.class] > 0 && (
                                                            <div className="absolute top-1.5 left-1.5 bg-blue-600 border border-blue-400 text-white font-black text-xs w-5 h-5 flex items-center justify-center rounded-lg shadow-md animate-pulse">
                                                                {voteTally[player.class]}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        {currentRound.players.some(p => p.isAbsent) && (
                                            <div className="pt-4 border-t border-slate-800">
                                                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Excluded From Pool ({currentRound.players.filter(p => p.isAbsent).length})</div>
                                                <div className="flex flex-wrap gap-2">
                                                    {currentRound.players.map((p, i) => p.isAbsent && (
                                                        <button key={p.class} onClick={() => toggleAbsent(i)} className="bg-slate-900 hover:bg-slate-800 border border-slate-800 hover:border-slate-700 text-slate-500 hover:text-slate-300 px-3 py-1.5 rounded-xl text-xs font-bold flex items-center gap-1 transition-all">
                                                            <Plus size={12} /> Seat {p.class}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </main>
                        </div>

                        {isEditingRoster && (
                            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                                <div className="bg-slate-900 border border-slate-800 w-full max-w-4xl max-h-[85vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-150">
                                    <div className="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                                        <div>
                                            <h3 className="text-2xl font-black text-white uppercase tracking-wider">Engine Customizations Matrix</h3>
                                            <p className="text-xs text-slate-400 mt-0.5">Control registration records and runtime random allocation generation pools.</p>
                                        </div>
                                        <button onClick={() => setIsEditingRoster(false)} className="p-2 hover:bg-slate-800 rounded-xl text-slate-400 border border-slate-800">
                                            <XIcon size={18} />
                                        </button>
                                    </div>

                                    <div className="flex border-b border-slate-800 px-6 bg-slate-900/30">
                                        <button className={`pb-3 pt-4 font-bold px-2 text-sm transition-all border-b-2 mr-6 ${activeSettingsTab === 'groups' ? 'text-indigo-400 border-indigo-500' : 'text-slate-400 border-transparent hover:text-slate-200'}`} onClick={() => setActiveSettingsTab('groups')}>Dynamic Registrations</button>
                                        <button className={`pb-3 pt-4 font-bold px-2 text-sm transition-all border-b-2 ${activeSettingsTab === 'roles' ? 'text-orange-400 border-orange-500' : 'text-slate-400 border-transparent hover:text-slate-200'}`} onClick={() => setActiveSettingsTab('roles')}>Allocation Deck Pool</button>
                                    </div>

                                    <div className="flex-1 overflow-y-auto p-6 custom-scrollbar bg-slate-950/20">
                                        {activeSettingsTab === 'groups' ? (
                                            <div className="grid md:grid-cols-3 gap-6 h-full">
                                                <div className="md:col-span-1 space-y-2 border-r border-slate-800/50 pr-4">
                                                    <div className="text-[10px] font-bold text-slate-500 uppercase tracking-wider px-2 mb-2">Available Pools</div>
                                                    {rosters.map(r => (
                                                        <div key={r.id} className="group/item flex items-center justify-between p-2 rounded-xl hover:bg-slate-800/60 transition-all">
                                                            <button onClick={() => openRosterEdit(r)} className="flex-1 text-left font-bold text-sm text-slate-300 group-hover/item:text-white truncate">
                                                                {r.name}
                                                                <span className="block text-[10px] font-medium text-slate-500 mt-0.5">{r.players.length} registered entries</span>
                                                            </button>
                                                            <button onClick={() => deleteRoster(r.id)} className="p-1.5 opacity-0 group-hover/item:opacity-100 hover:bg-red-950/50 text-red-500 border border-transparent hover:border-red-900/30 rounded-lg transition-all">
                                                                <Trash2 size={14} />
                                                            </button>
                                                        </div>
                                                    ))}
                                                    <div className="pt-2">
                                                        <button onClick={openRosterCreate} className="w-full bg-slate-800/50 hover:bg-slate-800 text-slate-300 border border-slate-800 font-bold p-2.5 rounded-xl text-xs flex items-center justify-center gap-1.5 transition-all">
                                                            <Plus size={14} /> Add New Entry Group
                                                        </button>
                                                    </div>
                                                </div>

                                                <div className="md:col-span-2 space-y-4">
                                                    <div className="bg-slate-900 border border-slate-800/80 p-5 rounded-2xl space-y-4">
                                                        <div className="text-xs font-bold text-slate-400 uppercase tracking-wider">Group Identity Editor</div>
                                                        <div>
                                                            <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Pool Identifier Description</label>
                                                            <input type="text" className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white font-bold text-sm outline-none focus:border-indigo-500" placeholder="e.g., Block A Match Matrix" value={rosterDraftName} onChange={(e) => setRosterDraftName(e.target.value)} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Seat IDs Matrix (One allocation item per newline)</label>
                                                            <textarea rows="6" className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white font-mono text-sm outline-none focus:border-indigo-500 custom-scrollbar resize-none" placeholder="1A&#10;1B&#10;1C" value={rosterDraftPlayers} onChange={(e) => setRosterDraftPlayers(e.target.value)}></textarea>
                                                        </div>
                                                        <div className="flex justify-end pt-2">
                                                            <button onClick={saveRoster} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-5 py-2 rounded-xl text-sm transition-all shadow-md shadow-indigo-600/10">Commit Registration Profile</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="space-y-6">
                                                <div className="p-4 bg-slate-900 border border-slate-800 rounded-2xl flex items-center justify-between">
                                                    <div>
                                                        <div className="text-sm font-bold text-white">Dynamic Balancing Deck Override</div>
                                                        <div className="text-xs text-slate-400 mt-0.5">Automate werewolf proportion calculation dynamically based on the total active table connection count.</div>
                                                    </div>
                                                    <div className="flex bg-slate-950 border border-slate-800 rounded-xl p-1">
                                                        <button onClick={() => handleToggleDefaultRoles(true)} className={`px-4 py-1.5 text-xs font-bold rounded-lg transition-all ${useDefaultRoles ? 'bg-orange-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}>Standard Config</button>
                                                        <button onClick={() => handleToggleDefaultRoles(false)} className={`px-4 py-1.5 text-xs font-bold rounded-lg transition-all ${!useDefaultRoles ? 'bg-orange-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}>Deck Matrix Mod</button>
                                                    </div>
                                                </div>

                                                {!useDefaultRoles && (
                                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                                                        {Object.keys(ROLE_DESCRIPTIONS).map(role => {
                                                            const count = roleDeck[role] || 0;
                                                            return (
                                                                <div key={role} className="flex justify-between items-center bg-slate-900 border border-slate-800 p-3 rounded-xl">
                                                                    <span className={`font-bold text-sm ${count > 0 ? 'text-white' : 'text-slate-500'}`}>{role}</span>
                                                                    <div className="flex items-center gap-3 bg-slate-950 rounded-lg p-1 border border-slate-800">
                                                                        <button onClick={() => updateRoleDeck(role, -1)} className="w-6 h-6 flex items-center justify-center rounded bg-slate-800 text-slate-300 hover:bg-slate-700 font-bold">-</button>
                                                                        <span className="w-4 text-center font-bold text-sm">{count}</span>
                                                                        <button onClick={() => updateRoleDeck(role, 1)} className="w-6 h-6 flex items-center justify-center rounded bg-slate-800 text-slate-300 hover:bg-slate-700 font-bold">+</button>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                        <style>{`.custom-scrollbar::-webkit-scrollbar { width: 6px; } .custom-scrollbar::-webkit-scrollbar-track { background: transparent; } .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }`}</style>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
