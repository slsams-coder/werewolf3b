<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Werewolf Tournament Hub</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900">
  
  <div id="root"></div>

  <script type="text/babel">
    
    // Grab React hooks directly from the global React object
    const { useState, useEffect } = React;

    // Converted Lucide Icons into standalone components
    const Users = ({size=24, className="", fill="none"}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const UserMinus = ({size=24, className="", fill="none"}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="22" x2="16" y1="11" y2="11"/></svg>;
    const RotateCcw = ({size=24, className="", fill="none"}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
    const Play = ({size=24, className="", fill="none"}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>;
    const Skull = ({size=24, className="", fill="none"}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><path d="M8 20v2h8v-2"/><path d="m12.5 17-.5-1-.5 1h1z"/><path d="M16 20a2 2 0 0 0 1.56-3.25 8 8 0 1 0-11.12 0A2 2 0 0 0 8 20"/></svg>;
    const Moon = ({size=24, className="", fill="none"}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
    const Eye = ({size=24, className="", fill="none"}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>;
    const EyeOff = ({size=24, className="", fill="none"}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>;
    const CheckCircle2 = ({size=24, className="", fill="none"}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
    const Heart = ({size=24, className="", fill="none"}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;
    const ListOrdered = ({size=24, className="", fill="none"}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="10" x2="21" y1="6" y2="6"/><line x1="10" x2="21" y1="12" y2="12"/><line x1="10" x2="21" y1="18" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>;

    const INITIAL_ROLES = [
      "Werewolf", "Werewolf (Hunter)", "Red Lady", "Prince", "Seer", 
      "Hunter", "Doctor", "Cupid", "Serial Killer", "Fool", 
      "Doctor", "Witch", "Cursed One", "Shepherd", "Werewolf (cub)", 
      "Seer", "Sheriff", "Werewolf", "Knight", "Villager"
    ];

    const CLASSES = [
      "Abeera", "Halima", "Faryal", "Mariam", "Binuthi", "Hasnain", "Aiyan", "Zakir", 
      "Arman", "Fham", "Ayaan", "Muzzamil", "Nawfal", "Pavandeep", "James", "Haris", 
      "Almas", "N/A", "N/A", "N/A"
    ];

    const NIGHT_ORDER = [
      "Cupid", "Serial Killer", "Werewolves", "Doctor", "Seer", "Witch", "Red Lady"
    ];

    const getNightInstruction = (role) => {
      if (role === "Cupid") return "select lovers";
      if (role === "Serial Killer") return "attack someone";
      if (role === "Werewolves") return "attack someone";
      if (role === "Doctor") return "save someone";
      if (role === "Seer") return "check someone";
      if (role === "Witch") return "choose whether to poison someone";
      if (role === "Red Lady") return "visit someone";
      return "perform their action";
    };

    const App = () => {
      const [activeRound, setActiveRound] = useState(1);
      const [showRoles, setShowRoles] = useState(false);
      const [sortByRole, setSortByRole] = useState(false);
      const [completedNightCalls, setCompletedNightCalls] = useState([]);
      const [roundsData, setRoundsData] = useState(() => {
        const saved = localStorage.getItem('werewolf_tournament_data');
        if (saved) return JSON.parse(saved);
        
        const initial = {};
        [1, 2, 3, 4].forEach(r => {
          initial[r] = {
            players: CLASSES.map(c => ({ 
              class: c, role: null, roleIndex: -1, isAbsent: false, isAlive: true, isRecentlyDead: false, isLover: false 
            })),
            isStarted: false,
            nightNumber: 1,
            witchUsedPotion: false
          };
        });
        return initial;
      });

      useEffect(() => {
        localStorage.setItem('werewolf_tournament_data', JSON.stringify(roundsData));
      }, [roundsData]);

      const currentRound = roundsData[activeRound];

      const toggleAbsence = (index) => {
        const newData = { ...roundsData };
        newData[activeRound].players[index].isAbsent = !newData[activeRound].players[index].isAbsent;
        setRoundsData(newData);
      };

      const assignRoles = () => {
        const activePlayers = currentRound.players.filter(p => !p.isAbsent);
        const count = activePlayers.length;
        
        // Map roles with their original index to properly handle duplicates
        const rolesToUse = INITIAL_ROLES.slice(0, count).map((role, idx) => ({ role, originalIndex: idx }));
        
        for (let i = rolesToUse.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [rolesToUse[i], rolesToUse[j]] = [rolesToUse[j], rolesToUse[i]];
        }

        const newData = { ...roundsData };
        let roleIdx = 0;
        newData[activeRound].players.forEach((p) => {
          if (!p.isAbsent) {
            const assigned = rolesToUse[roleIdx++];
            p.role = assigned.role;
            p.roleIndex = assigned.originalIndex; // Save index for sorting identical roles correctly
            p.isAlive = true;
            p.isLover = false;
            p.isRecentlyDead = false;
          } else {
            p.role = null;
            p.roleIndex = -1;
          }
        });
        newData[activeRound].isStarted = true;
        newData[activeRound].nightNumber = 1;
        newData[activeRound].witchUsedPotion = false;
        setRoundsData(newData);
      };

      const toggleAlive = (index) => {
        const newData = { ...roundsData };
        const player = newData[activeRound].players[index];
        const isLover = player.isLover;
        
        let nextAlive, nextRecent;
        if (player.isAlive) {
          nextAlive = false;
          nextRecent = true;
        } else if (player.isRecentlyDead) {
          nextAlive = false;
          nextRecent = false;
        } else {
          nextAlive = true;
          nextRecent = false;
        }
        
        player.isAlive = nextAlive;
        player.isRecentlyDead = nextRecent;

        if (isLover) {
          newData[activeRound].players.forEach(p => {
            if (p.isLover && p !== player) {
              p.isAlive = nextAlive;
              p.isRecentlyDead = nextRecent;
            }
          });
        }
        setRoundsData(newData);
      };

      const toggleLover = (index) => {
        const newData = { ...roundsData };
        newData[activeRound].players[index].isLover = !newData[activeRound].players[index].isLover;
        setRoundsData(newData);
      };

      const resetRound = () => {
        const newData = { ...roundsData };
        newData[activeRound] = {
          players: CLASSES.map(c => ({ class: c, role: null, roleIndex: -1, isAbsent: false, isAlive: true, isRecentlyDead: false, isLover: false })),
          isStarted: false,
          nightNumber: 1,
          witchUsedPotion: false
        };
        setRoundsData(newData);
        setCompletedNightCalls([]);
        setShowRoles(false);
        setSortByRole(false);
      };

      const handleResetChecklist = () => {
        setCompletedNightCalls([]);
        const newData = { ...roundsData };
        newData[activeRound].nightNumber = (newData[activeRound].nightNumber || 1) + 1;
        setRoundsData(newData);
      };

      const toggleNightCall = (role) => {
        setCompletedNightCalls(prev => 
          prev.includes(role) ? prev.filter(r => r !== role) : [...prev, role]
        );
      };

      const aliveRolesList = currentRound.players
        .filter(p => p.isAlive && !p.isAbsent && p.role)
        .map(p => p.role);

      const assignedRolesList = currentRound.players
        .filter(p => !p.isAbsent && p.role)
        .map(p => p.role);

      const hasAssigned = (category) => {
        if (category === "Werewolves") return assignedRolesList.some(r => r.includes("Werewolf"));
        return assignedRolesList.includes(category);
      };

      const hasAlive = (category) => {
        if (category === "Werewolves") return aliveRolesList.some(r => r.includes("Werewolf"));
        return aliveRolesList.includes(category);
      };

      const nightCalls = NIGHT_ORDER.filter(role => hasAssigned(role));
      const aliveCount = currentRound.players.filter(p => p.isAlive && !p.isAbsent && p.role).length;
      const totalCount = currentRound.players.filter(p => !p.isAbsent && p.role).length;

      const getRoleColor = (role) => {
        if (!role) return '';
        if (role.includes('Werewolf')) return 'text-red-400';
        if (role === 'Serial Killer' || role === 'Fool') return 'text-yellow-400';
        return 'text-blue-400';
      };

      // Sorting Logic
      const displayPlayers = [...currentRound.players].sort((a, b) => {
        if (sortByRole && currentRound.isStarted) {
          const getIndex = (p) => {
            if (p.isAbsent || !p.role) return 999;
            // Fallback to indexOf for backwards compatibility with pre-existing saves
            return p.roleIndex !== undefined && p.roleIndex !== -1 ? p.roleIndex : INITIAL_ROLES.indexOf(p.role);
          };
          
          const indexA = getIndex(a);
          const indexB = getIndex(b);
          
          if (indexA !== indexB) {
            return indexA - indexB;
          }
        }
        // Default alphabetical sort
        return CLASSES.indexOf(a.class) - CLASSES.indexOf(b.class);
      });

      return (
        <div className="min-h-screen font-sans p-4 md:p-8 bg-slate-900 text-slate-100">
          <header className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
            <div>
              <h1 className="text-3xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-red-600 uppercase italic">
                Werewolf Tournament Hub
              </h1>
              <p className="text-slate-400 font-medium">HKTAYY3 English Week 2025-26</p>
            </div>
            <div className="flex bg-slate-800 p-1 rounded-xl shadow-inner border border-slate-700">
              {[1, 2, 3, 4].map(r => (
                <button
                  key={r}
                  onClick={() => setActiveRound(r)}
                  className={`px-6 py-2 rounded-lg font-bold transition-all ${
                    activeRound === r ? 'bg-orange-500 text-white shadow-lg' : 'text-slate-400'
                  }`}
                >
                  Round {r}
                </button>
              ))}
            </div>
          </header>

          <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
            <section className="lg:col-span-7 space-y-6">
              <div className="rounded-3xl p-6 border shadow-xl bg-slate-800 border-slate-700">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-xl font-bold flex items-center gap-2">
                    <Users className="text-orange-500" /> Player Registration
                  </h2>
                  <div className="flex gap-2 items-center">
                    {currentRound.isStarted && (
                      <div className="mr-4 px-4 py-1 bg-slate-900/50 rounded-full text-sm font-bold border border-slate-700/50">
                        Alive: <span className="text-green-400">{aliveCount}</span> / {totalCount}
                      </div>
                    )}
                    {currentRound.isStarted && (
                      <>
                        <button 
                          onClick={() => setSortByRole(!sortByRole)} 
                          className={`p-2 hover:bg-slate-700 rounded-full transition-colors ${sortByRole ? 'text-orange-400 bg-slate-900/80 shadow-inner' : 'text-slate-400'}`}
                          title="Sort by Physical Card Deck Order"
                        >
                          <ListOrdered size={20} />
                        </button>
                        <button onClick={() => setShowRoles(!showRoles)} className="p-2 hover:bg-slate-700 rounded-full text-slate-400">
                          {showRoles ? <EyeOff size={20} /> : <Eye size={20} />}
                        </button>
                      </>
                    )}
                    <button onClick={resetRound} className="p-2 hover:bg-slate-700 rounded-full text-slate-400">
                      <RotateCcw size={20} />
                    </button>
                    {!currentRound.isStarted && (
                      <button onClick={assignRoles} className="bg-green-600 hover:bg-green-500 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2 shadow-lg">
                        <Play size={18} fill="currentColor" /> Start Game
                      </button>
                    )}
                  </div>
                </div>

                <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                  {displayPlayers.map((player) => {
                    // Extracting original index ensures data stays mapped perfectly even when the visual grid is sorted
                    const originalIdx = CLASSES.indexOf(player.class);
                    
                    return (
                      <div 
                        key={player.class}
                        onClick={() => !currentRound.isStarted ? toggleAbsence(originalIdx) : !player.isAbsent && toggleAlive(originalIdx)}
                        className={`relative p-4 rounded-2xl border-2 transition-all cursor-pointer select-none
                          ${player.isAbsent ? 'bg-slate-900 border-slate-800 opacity-40' 
                            : currentRound.isStarted && !player.isAlive
                              ? (player.isRecentlyDead ? 'bg-red-900/40 border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.3)]' : 'bg-red-900/30 border-red-900/50 opacity-60')
                              : 'bg-slate-700 border-slate-600 hover:border-orange-400'}
                        `}
                      >
                        {currentRound.isStarted && !player.isAbsent && showRoles && (
                          <button
                            onClick={(e) => { e.stopPropagation(); toggleLover(originalIdx); }}
                            className={`absolute top-2 left-2 z-10 p-1 rounded-full ${player.isLover ? 'text-pink-500 bg-pink-500/20' : 'text-slate-500'}`}
                          >
                            <Heart size={16} fill={player.isLover ? "currentColor" : "none"} />
                          </button>
                        )}
                        <div className="text-xs font-black text-slate-400 mb-1 text-center uppercase">Class</div>
                        <div className={`text-2xl font-bold text-center ${currentRound.isStarted && !player.isAlive ? 'text-slate-500 line-through' : ''}`}>
                          {player.class}
                        </div>
                        {player.isAbsent && <div className="absolute top-2 right-2 text-red-500"><UserMinus size={16} /></div>}
                        {currentRound.isStarted && !player.isAlive && !player.isAbsent && (
                          <div className="absolute top-2 right-2 flex flex-col items-end text-red-500">
                            <Skull size={16} className={player.isRecentlyDead ? 'text-red-400' : 'text-red-800'} />
                          </div>
                        )}
                        {player.role && (
                          <div className="mt-2 pt-2 border-t border-slate-600/50 text-center">
                            <div className={`text-xs font-bold uppercase ${showRoles || !player.isAlive ? getRoleColor(player.role) : 'text-slate-500'}`}>
                              {showRoles || !player.isAlive ? player.role : '••••••'}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            </section>

            <section className="lg:col-span-5 space-y-6">
              <div className="rounded-3xl p-6 border shadow-xl overflow-hidden relative bg-indigo-900/40 border-indigo-700/50">
                <div className="flex justify-between items-center mb-4 relative z-10">
                  <h2 className="text-xl font-bold flex items-center gap-2">
                    <Moon className="text-indigo-400" /> Night {currentRound.nightNumber} Call Order
                  </h2>
                  {currentRound.isStarted && (
                    <button onClick={handleResetChecklist} className="text-xs font-bold bg-indigo-500/20 text-indigo-300 hover:bg-indigo-500/40 px-3 py-1 rounded-full">
                      Next Night
                    </button>
                  )}
                </div>
                <div className="space-y-2 relative z-10">
                  {nightCalls.length > 0 ? nightCalls.map((roleCat, idx) => {
                    const isDead = !hasAlive(roleCat);
                    const isPastCupid = roleCat === "Cupid" && currentRound.nightNumber > 1;
                    const isWitchUsed = roleCat === "Witch" && currentRound.witchUsedPotion;
                    const isCompleted = isDead || isPastCupid || isWitchUsed || completedNightCalls.includes(roleCat);
                    const display = roleCat === "Doctor" ? "Doctors" : roleCat === "Seer" ? "Seers" : roleCat;

                    return (
                      <div 
                        key={idx} 
                        onClick={() => !(isDead || isPastCupid || isWitchUsed) && toggleNightCall(roleCat)}
                        className={`flex items-center gap-3 p-3 rounded-xl border transition-all ${isCompleted ? 'bg-indigo-900/20 opacity-50' : 'bg-indigo-900/50 border-indigo-700/50 cursor-pointer'}`}
                      >
                        <div className={`w-6 h-6 shrink-0 flex items-center justify-center rounded-full text-xs font-bold ${isCompleted ? 'bg-indigo-900 text-indigo-500' : 'bg-indigo-500/20 text-indigo-400'}`}>
                          {isCompleted ? <CheckCircle2 size={14} /> : idx + 1}
                        </div>
                        <div className="flex flex-col flex-1">
                          <span className={`font-semibold ${isCompleted ? 'text-indigo-500 line-through' : 'text-slate-200'}`}>
                            Wake up the <span className="italic">{display}</span>
                            {isDead && !isPastCupid && <span className="ml-2 text-[10px] text-red-500">(Dead)</span>}
                            {isPastCupid && <span className="ml-2 text-[10px] text-indigo-400">(Night 1 Only)</span>}
                            {isWitchUsed && !isDead && <span className="ml-2 text-[10px] text-indigo-400">(Used)</span>}
                          </span>
                          <span className={`text-sm ${isCompleted ? 'text-indigo-700 line-through' : 'text-indigo-300/70'}`}>Action: {getNightInstruction(roleCat)}</span>
                        </div>
                        {roleCat === "Witch" && !isDead && (
                          <button
                            onClick={(e) => {
                              e.stopPropagation();
                              const newData = { ...roundsData };
                              newData[activeRound].witchUsedPotion = !newData[activeRound].witchUsedPotion;
                              setRoundsData(newData);
                            }}
                            className="text-[10px] bg-indigo-500/20 text-indigo-300 px-2 py-1 rounded border border-indigo-500/30"
                          >
                            {currentRound.witchUsedPotion ? 'Undo' : 'Used'}
                          </button>
                        )}
                      </div>
                    );
                  }) : <div className="text-slate-500 italic p-4 text-center border-2 border-dashed border-slate-700 rounded-2xl">Start game to see night order</div>}
                </div>
              </div>
            </section>
          </main>
        </div>
      );
    };

    // Render the App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
